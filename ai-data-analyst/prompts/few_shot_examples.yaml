few_shot_examples:
  - question: "월별 전체 매출 추이를 보여줘"
    output:
      sql: "SELECT DATE_TRUNC('month', event_date) AS month, SUM(amount) AS revenue FROM fact_events WHERE event_type='purchase' GROUP BY 1 ORDER BY 1"
      chart_type: line
      summary: "월별 누적 매출 추이를 보여줍니다."

  - question: "카테고리별 총 매출 비교"
    output:
      sql: "SELECT product_category, SUM(amount) AS revenue FROM fact_events WHERE event_type='purchase' GROUP BY product_category ORDER BY revenue DESC"
      chart_type: bar
      summary: "카테고리별 총 매출을 비교합니다."

  - question: "카테고리별 전환율은?"
    output:
      sql: "SELECT product_category, ROUND(COUNT(*) FILTER (WHERE event_type='purchase') * 1.0 / NULLIF(COUNT(*) FILTER (WHERE event_type='visit'), 0), 4) AS conversion_rate FROM fact_events GROUP BY product_category ORDER BY conversion_rate DESC"
      chart_type: bar
      summary: "카테고리별 전환율(구매수/방문수)을 비교합니다."

  - question: "월별 전환율 추이를 보여줘"
    output:
      sql: "SELECT DATE_TRUNC('month', event_date) AS month, ROUND(COUNT(*) FILTER (WHERE event_type='purchase') * 1.0 / NULLIF(COUNT(*) FILTER (WHERE event_type='visit'), 0), 4) AS conversion_rate FROM fact_events GROUP BY 1 ORDER BY 1"
      chart_type: line
      summary: "월별 전체 전환율 추이를 보여줍니다."

  - question: "30대 여성의 카테고리별 매출"
    output:
      sql: "SELECT product_category, SUM(amount) AS revenue FROM fact_events WHERE event_type='purchase' AND age_group='30s' AND gender='female' GROUP BY product_category ORDER BY revenue DESC"
      chart_type: bar
      summary: "30대 여성 고객의 카테고리별 매출을 분석합니다."

  - question: "연령대별 평균 구매 금액"
    output:
      sql: "SELECT age_group, ROUND(AVG(amount), 2) AS avg_purchase FROM fact_events WHERE event_type='purchase' GROUP BY age_group ORDER BY age_group"
      chart_type: bar
      summary: "연령대별 평균 1회 구매 금액을 비교합니다."

  - question: "성별 구매 비중"
    output:
      sql: "SELECT gender, COUNT(*) AS purchase_count FROM fact_events WHERE event_type='purchase' GROUP BY gender"
      chart_type: pie
      summary: "성별 구매 비중을 파이 차트로 보여줍니다."

  - question: "로열티 멤버 vs 일반 고객 매출"
    output:
      sql: "SELECT loyalty_member, ROUND(AVG(amount),2) AS avg_revenue, COUNT(*) AS purchase_count, ROUND(SUM(amount),2) AS total_revenue FROM fact_events WHERE event_type='purchase' GROUP BY loyalty_member"
      chart_type: bar
      summary: "로열티 멤버와 일반 고객의 구매 지표를 비교합니다."

  - question: "카테고리별 매출 비중"
    output:
      sql: "SELECT product_category, SUM(amount) AS revenue FROM fact_events WHERE event_type='purchase' GROUP BY product_category ORDER BY revenue DESC"
      chart_type: pie
      summary: "전체 매출에서 각 카테고리가 차지하는 비중을 보여줍니다."
